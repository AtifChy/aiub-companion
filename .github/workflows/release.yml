name: Release

on:
  push:
    tags:
      - "v*" # Trigger on any version tag, e.g., v0.1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package App
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os: windows
          - platform: ubuntu-latest
            os: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # fetch all history for automated release notes

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.0
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Install PNPM
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install NSIS on Windows
        if: matrix.os == 'windows'
        uses: repolevedavaj/install-nsis@v1.2.1
        with:
          nsis-version: 3.12

      - name: Install Linux Dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev build-essential

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build & Package Installer
        run: wails3 package

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: bin/*
          generate_release_notes: true
          draft: false
          prerelease: false
