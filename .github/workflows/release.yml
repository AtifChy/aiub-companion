name: Release

on:
  push:
    tags:
      - "v*" # Trigger on any version tag, e.g., v0.1.0
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    name: Build & Package App
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os: windows
            arch: amd64
          - platform: ubuntu-latest
            os: linux
            arch: amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # fetch all history for automated release notes

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.0
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Install PNPM
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install NSIS on Windows
        if: matrix.os == 'windows'
        uses: negrutiu/nsis-install@v3

      - name: Install Linux Dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev build-essential

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build & Package Installer
        run: wails3 package

      - name: Rename Windows Artifacts
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Rename-Item `
            "bin/${{ github.event.repository.name }}-${{ matrix.arch }}-installer.exe" `
            "${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch }}-installer.exe"

          Rename-Item `
            "bin/${{ github.event.repository.name }}.exe" `
            "${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch }}.exe"

      - name: Rename Linux Artifacts
        if: matrix.os == 'linux'
        run: |
          for file in bin/*; do
            ext="${file##*.}"
            case "$ext" in
              AppImage)
                mv "$file" "bin/${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch }}.AppImage"
                ;;
              deb)
                mv "$file" "bin/${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch }}.deb"
                ;;
              rpm)
                mv "$file" "bin/${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch }}.rpm"
                ;;
              zst)
                mv "$file" "bin/${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch }}.pkg.tar.zst"
                ;;
            esac
          done

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}
          path: bin/*.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download Workflow Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Release Notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .cliff.toml
          args: --latest
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create Github Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.git-cliff.outputs.content }}
          files: artifacts/**/*
          draft: false
          prerelease: false

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Changelog
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # fetch all history for automated release notes

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit Changelog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
